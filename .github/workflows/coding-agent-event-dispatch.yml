name: Coding Agent Dispatch

on:
  issues:
    types: [assigned]
  pull_request:
    types: [assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  dispatch:
    runs-on: self-hosted
    steps:
      - name: Dispatch event to Marshal
        env:
          MARSHAL_URL: ${{ vars.MARSHAL_URL || 'http://localhost:8080' }}
        run: |
          curl -sf --max-time 10 \
            -X POST "${MARSHAL_URL}/dispatch" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${GITHUB_EVENT_NAME}" \
            -d @"${GITHUB_EVENT_PATH}"
